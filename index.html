<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mivtza Display</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* This stacks the two windows on top of each other */
    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      transition: opacity 1.5s ease-in-out; /* Makes the switch look professional */
    }

    /* Hide the screen by making it transparent */
    .hidden {
      opacity: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Show the screen */
    .visible {
      opacity: 1;
      z-index: 1;
      pointer-events: auto;
    }

    /* Floating Clock Overlay */
    #clock-overlay {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100; /* Ensure it stays above both iframes */
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 2rem;
      font-weight: bold;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      pointer-events: none; /* Let clicks pass through to iframes if needed */
    }
  </style>

  <script>
    let current = 0;

    function rotate() {
      const dashboard = document.getElementById("dashboard");
      const slides = document.getElementById("slides");

      // Logic: If current is 0, show SLIDES. If current is 1, show DASHBOARD.
      if (current === 0) {
        dashboard.className = "screen hidden";
        slides.className = "screen visible";
        current = 1;
      } else {
        dashboard.className = "screen visible";
        slides.className = "screen hidden";
        current = 0;
      }
    }

    function updateClock() {
      const clockElement = document.getElementById("clock-overlay");
      const now = new Date();
      
      // Formatting time to HH:MM:SS
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      clockElement.textContent = `${hours}:${minutes}:${seconds}`;
    }

    window.onload = function() {
      // Rotate iframes every 20 seconds
      setInterval(rotate, 20000); 

      // Update the clock every second
      updateClock();
      setInterval(updateClock, 1000);
    };
  </script>
</head>

<body>
  <!-- Floating Clock -->
  <div id="clock-overlay">00:00:00</div>

  <iframe 
    id="dashboard" 
    class="screen visible" 
    src="https://rabbibergstein-hub.github.io/Mivtza-Yedios-Klaliyos-Dashboard/">
  </iframe>

  <iframe 
    id="slides" 
    class="screen hidden" 
    src="https://docs.google.com/presentation/d/e/2PACX-1vSO-qw-BQKFidxCH7uLWlgC0vHbd-0S_PTECGZJwqzy0xl9Q_FqjuY-FqYs5-IB6ZjvEHhjD2Q_ekjt/embed?start=true&loop=true&delayms=1000">
  </iframe>
</body>
</html>
